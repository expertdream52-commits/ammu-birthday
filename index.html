<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hey Ammu 💖</title>

<style>
body {
  margin: 0;
  text-align: center;
  font-family: Arial;
  background: linear-gradient(45deg, #ff6ec4, #7873f5);
  color: white;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

.container {
  position: relative;
  z-index: 2;
  top: 80px;
}

h1 {
  font-size: 50px;
}

p {
  font-size: 22px;
}

.cake {
  margin: 30px auto;
  width: 150px;
  height: 100px;
  background: pink;
  border-radius: 10px;
  position: relative;
}

.candle {
  width: 10px;
  height: 30px;
  background: yellow;
  position: absolute;
  top: -30px;
  left: 70px;
}

.flame {
  width: 10px;
  height: 15px;
  background: orange;
  border-radius: 50%;
  animation: flicker 0.3s infinite;
}

@keyframes flicker {
  0% { transform: scale(1); }
  100% { transform: scale(1.2); }
}

.slideshow {
  width: 250px;
  height: 250px;
  margin: auto;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.slideshow img {
  width: 100%;
  height: 100%;
  position: absolute;
  opacity: 0;
  animation: slide 12s infinite;
}

.slideshow img:nth-child(1) { animation-delay: 0s; }
.slideshow img:nth-child(2) { animation-delay: 4s; }
.slideshow img:nth-child(3) { animation-delay: 8s; }

@keyframes slide {
  0% { opacity: 0; }
  10% { opacity: 1; }
  30% { opacity: 1; }
  40% { opacity: 0; }
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-800px); opacity: 0; }
}
</style>
</head>

<body>

<div id="startScreen" style="height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;">
  <h1>🎁 Tap to Open Surprise 🎁</h1>
  <button onclick="start()" style="padding:15px 30px;font-size:18px;border:none;border-radius:10px;background:white;color:black;cursor:pointer;">
    Open 🎉
  </button>
</div>

<div id="mainContent" style="display:none;" class="container">

  <h1 id="typing"></h1>

  <p>
    Dear Ammu 💖 <br><br>
    You are the most special person in my life ❤️<br>
    May your day be filled with happiness, love & surprises 🎁✨<br><br>
    Enjoy your day 🥳
  </p>

  <div class="cake">
    <div class="candle">
      <div class="flame"></div>
    </div>
  </div>

  <div class="slideshow">
    <img src="https://picsum.photos/id/1011/400/400">
    <img src="https://picsum.photos/id/1025/400/400">
    <img src="https://picsum.photos/id/1035/400/400">
  </div>

  <h2 style="margin-top:30px;">From Saiom 💖</h2>

</div>

<button onclick="playMusic()" style="position:fixed;bottom:20px;right:20px;padding:10px;border-radius:50%;border:none;">
🎵
</button>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3">
</audio>

<script>
// Start
function start() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
  typeText();
}

// Typing
const text = "Hey Ammu 💖";
let i = 0;

function typeText() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 100);
  }
}

// Music
function playMusic() {
  document.getElementById("music").play();
}

// Floating hearts
setInterval(() => {
  let heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.style.position = "fixed";
  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.top = "100%";
  heart.style.fontSize = "20px";
  heart.style.animation = "floatUp 4s linear";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 4000);
}, 500);
</script>

</body>
</html>
